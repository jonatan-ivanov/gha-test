name: "Build Workflow"
"on":
  workflow_dispatch:
permissions:
  contents: "read"
concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
jobs:
  build:
    name: "Build Job"
    runs-on: "ubuntu-latest"
    steps:
    - name: "Check Out Code"
      uses: "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0" # 7.0.0
      with:
        fetch-depth: "0"
        ref: "${{ github.ref }}"
    - name: "Build Step"
      id: "build"
      uses: "./.github/actions/build"
