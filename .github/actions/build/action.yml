name: "Build Action"
description: "Action that builds the project"
runs:
  using: composite
  steps:
    - name: Build Setup
      shell: bash
      run: |
        echo "RELEASE_VERSION=${GITHUB_REF_NAME/release\//}" >> "$GITHUB_ENV"
    - name: Build Info
      shell: bash
      run: |
        echo 'Ref type: ${{ github.ref_type }}'
        echo 'Ref name: ${{ github.ref_name }}'
        echo 'Ref: ${{ github.ref }}'
        echo 'Commit: ${{ github.sha }}'
        echo "$RELEASE_VERSION"
